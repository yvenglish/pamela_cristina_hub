<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pamela Cristina · Flashcards</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="flashcards.css">
</head>
<body>
  <main class="container">
    <section class="hero">
      <div class="eyebrow">Smart Review · Pamela Cristina</div>
      <h1>Flashcards<br><span class="script">YV ✦</span></h1>
      <p>Toque para virar o card, ouça a pronúncia e marque o quanto você sabe. As palavras difíceis aparecem mais vezes.</p>
      <div class="hero-actions"><a class="btn secondary" href="index.html">← Voltar ao hub</a><button class="btn primary" onclick="resetStats()">Resetar progresso</button></div>
      <div class="stats"><div class="stat"><strong id="knownCount">0</strong><span>dominadas</span></div><div class="stat"><strong id="reviewCount">0</strong><span>para revisar</span></div><div class="stat"><strong id="totalCount">0</strong><span>cards</span></div></div>
    </section>
    <section class="flash-wrap"><div class="flash-stage"><div class="flashcard" id="flashcard" onclick="flipCard()"><div class="flash-inner"><div class="flash-face flash-front"><span class="flash-label">English</span><h3 id="flashEnglish"></h3><p id="flashHint">Tap to flip</p></div><div class="flash-face flash-back"><span class="flash-label">Português</span><h3 id="flashPortuguese"></h3><p>Tap to go back</p></div></div></div></div><div class="actions"><button class="btn listen" onclick="speakCard(event)">🔊 Listen</button><div class="row"><button class="btn bad" onclick="gradeCard('again')">I don't know</button><button class="btn medium" onclick="gradeCard('hard')">Not sure</button><button class="btn good" onclick="gradeCard('easy')">I know this</button></div></div><p class="progress-note" id="progressNote"></p></section>
  </main>
  <script src="flashcards.js"></script>
</body>
</html>
